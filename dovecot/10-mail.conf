# Mail location - the userdb query in dovecot-sql.conf.ext sets the home directory
# which contains the Maildir
mail_location = maildir:~/Maildir

# System user and group for mail processes
mail_uid = 1001
mail_gid = 1001

first_valid_uid = 1001
last_valid_uid = 1001
first_valid_gid = 1001
last_valid_gid = 1001

namespace inbox {
  type = private
  separator = /
  prefix = 
  inbox = yes
}
