# Mail location maps directly to the Maildir written by smtp/index.js
mail_driver = maildir
mail_home = /app/maildata/%{user | lower}
mail_path = ~/Maildir

# System user and group for mail processes
mail_uid = 1000
mail_gid = 1000

first_valid_uid = 1000
last_valid_uid = 1000
first_valid_gid = 1000
last_valid_gid = 1000

namespace inbox {
  type = private
  separator = /
  prefix = 
  inbox = yes
}

# Use filesystem mailbox layout so INBOX maps directly to ~/Maildir.
mailbox_list_layout = fs
