# Native Dovecot 2.4+ SQL driver configuration
# Database credentials are injected via environment variables in docker-compose.yml
sql_driver = pgsql

pgsql postgres {
  parameters {
    host = postgres
    user = nubmail
    dbname = nubmail
    # TODO(security): Use Docker secrets or a secret manager instead of env vars
    # for database credentials in production deployments.
    password = nubmail
  }
}
