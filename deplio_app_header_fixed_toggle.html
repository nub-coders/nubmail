
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
.bar{font-family:'DM Sans',sans-serif;background:#0d0f12;border:1px solid #1a2030;border-radius:10px;padding:12px 18px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px}
.left{display:flex;align-items:center;gap:10px}
.app-name{font-size:15px;font-weight:600;color:#e2e8f0}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:3px 9px;border-radius:5px}
.badge-stopped{background:#1a0d0d;color:#e05050;border:1px solid #3a1515}
.badge-running{background:#0d1a10;color:#1a9e6e;border:1px solid #1a4a35}
.dot{width:6px;height:6px;border-radius:50%}
.right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* PROPER TOGGLE */
.toggle-wrap{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.toggle-wrap input{display:none}
.toggle-track{width:38px;height:22px;background:#1a2030;border-radius:99px;position:relative;transition:background .2s;border:1px solid #2d3a50;flex-shrink:0}
.toggle-track.on{background:#4a9fd8;border-color:#4a9fd8}
.toggle-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;background:#fff;border-radius:50%;transition:left .2s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 3px rgba(0,0,0,.4)}
.toggle-track.on .toggle-thumb{left:19px}
.toggle-lbl{font-size:11px;color:#718096;font-weight:500;transition:color .2s}
.toggle-wrap:has(.toggle-track.on) .toggle-lbl{color:#4a9fd8}

.divider{width:1px;height:20px;background:#1a2030}
.btn{font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;padding:7px 15px;border-radius:8px;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-start{background:#1a9e6e;color:#fff}.btn-start:hover{background:#15835b}.btn-start:active{transform:scale(.97)}
.btn-rebuild{background:#1a2030;color:#a0aec0;border:1px solid #1e2a3a}.btn-rebuild:hover{color:#e2e8f0}.btn-rebuild:active{transform:scale(.97)}
.btn-rebuild.spin i{animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

<div style="padding:1rem 0">
  <div class="bar">
    <div class="left">
      <span class="app-name">wecec</span>
      <span class="badge badge-stopped" id="statusBadge">
        <span class="dot" style="background:#e05050" id="statusDot"></span>
        <span id="statusTxt">Stopped</span>
      </span>
    </div>
    <div class="right">
      <label class="toggle-wrap" onclick="flipToggle()">
        <div class="toggle-track" id="track"><div class="toggle-thumb"></div></div>
        <span class="toggle-lbl">Use browser cookies (for YouTube-DL)</span>
      </label>
      <div class="divider"></div>
      <button class="btn btn-start" onclick="handleStart(this)">
        <i class="ti ti-player-play" id="startIcon" aria-hidden="true"></i>
        <span id="startTxt">Start</span>
      </button>
      <button class="btn btn-rebuild" onclick="handleRebuild(this)">
        <i class="ti ti-refresh" aria-hidden="true"></i> Rebuild
      </button>
    </div>
  </div>
</div>

<script>
var running=false;
function flipToggle(){
  document.getElementById('track').classList.toggle('on');
}
function handleStart(btn){
  running=!running;
  document.getElementById('startIcon').className=running?'ti ti-player-stop':'ti ti-player-play';
  document.getElementById('startTxt').textContent=running?'Stop':'Start';
  btn.style.background=running?'#a02020':'';
  document.getElementById('statusBadge').className='badge '+(running?'badge-running':'badge-stopped');
  document.getElementById('statusDot').style.background=running?'#1a9e6e':'#e05050';
  document.getElementById('statusTxt').textContent=running?'Running':'Stopped';
}
function handleRebuild(btn){
  btn.classList.add('spin');btn.disabled=true;
  setTimeout(()=>{btn.classList.remove('spin');btn.disabled=false;},2000);
}
</script>
