version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: nubmail-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: nubmail
      MONGO_INITDB_ROOT_PASSWORD: nubmail
      MONGO_INITDB_DATABASE: nubmail
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - nubmail-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nubmail-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-g1hpWCNI514bk2otc3XzGSLspUU1EGVFJ6IixTYY4X8}
      MONGODB_URI: mongodb://nubmail:nubmail@mongodb:27017/nubmail?authSource=admin
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      DOMAIN: ${DOMAIN:-localhost:3000}
      PROTOCOL: ${PROTOCOL:-http}
      ADMIN_PASS: ${ADMIN_PASS}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    depends_on:
      - mongodb
    networks:
      - nubmail-network

  app-dev:
    image: node:20-alpine
    container_name: nubmail-app-dev
    working_dir: /app
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-g1hpWCNI514bk2otc3XzGSLspUU1EGVFJ6IixTYY4X8}
      MONGODB_URI: mongodb://nubmail:nubmail@mongodb:27017/nubmail?authSource=admin
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      DOMAIN: ${DOMAIN:-localhost:5000}
      PROTOCOL: ${PROTOCOL:-http}
      ADMIN_PASS: ${ADMIN_PASS}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npm run dev -- -p 5000"
    depends_on:
      - mongodb
    networks:
      - nubmail-network
    profiles:
      - dev

networks:
  nubmail-network:
    driver: bridge

volumes:
  mongodb_data:
  mongodb_config:
