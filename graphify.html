<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nubmail · Architecture Graph</title>
  <meta name="description" content="Interactive architecture dependency graph for the nubmail project — visualize services, routes, data flows, and module relationships." />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07080f;
      --surface: #0d0f1c;
      --surface2: #12152a;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.14);
      --text: #e8eaf0;
      --text-dim: #6b7280;
      --text-muted: #374151;

      --c-client:    #38bdf8;
      --c-api:       #a78bfa;
      --c-service:   #34d399;
      --c-infra:     #f59e0b;
      --c-data:      #fb7185;
      --c-external:  #94a3b8;

      --glow-client:   0 0 20px rgba(56,189,248,0.4);
      --glow-api:      0 0 20px rgba(167,139,250,0.4);
      --glow-service:  0 0 20px rgba(52,211,153,0.4);
      --glow-infra:    0 0 20px rgba(245,158,11,0.4);
      --glow-data:     0 0 20px rgba(251,113,133,0.4);
      --glow-external: 0 0 20px rgba(148,163,184,0.3);
    }

    html, body { width: 100%; height: 100%; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); overflow: hidden; }

    /* ── Header ─────────────────────────────── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 52px;
      display: flex; align-items: center; gap: 14px; padding: 0 18px;
      background: rgba(7,8,15,0.9);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }
    #header .logo {
      font-size: 14px; font-weight: 700; letter-spacing: -0.3px;
      background: linear-gradient(90deg, #38bdf8, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      white-space: nowrap; flex-shrink: 0;
    }
    #header .sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
    #search-wrap { flex: 1; max-width: 260px; position: relative; }
    #search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--text-dim); pointer-events: none;
    }
    #search {
      width: 100%; padding: 5px 10px 5px 30px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); font-size: 12.5px;
      font-family: inherit; outline: none; transition: border-color .2s;
    }
    #search:focus { border-color: #38bdf8; }
    #search::placeholder { color: var(--text-dim); }

    /* stats chips */
    #stats-bar { display: flex; gap: 6px; align-items: center; }
    .stat-chip {
      display: flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--surface2);
      font-size: 10.5px; color: var(--text-dim);
    }
    .stat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    .legend {
      display: flex; gap: 8px; align-items: center; margin-left: auto;
    }
    .leg-item {
      display: flex; align-items: center; gap: 4px;
      font-size: 10.5px; color: var(--text-dim); cursor: pointer;
      padding: 2px 7px; border-radius: 20px;
      border: 1px solid transparent; transition: all .2s;
    }
    .leg-item:hover { border-color: var(--border-hover); color: var(--text); }
    .leg-item.active { border-color: var(--border-hover); color: var(--text); background: var(--surface2); }
    .leg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    .btn-group { display: flex; gap: 4px; flex-shrink: 0; }
    .icon-btn {
      height: 28px; min-width: 28px; padding: 0 8px;
      border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text-dim); cursor: pointer; font-size: 13px;
      display: flex; align-items: center; justify-content: center; gap: 4px;
      transition: all .2s; white-space: nowrap; font-family: inherit;
    }
    .icon-btn:hover { border-color: var(--border-hover); color: var(--text); background: var(--surface); }
    .icon-btn .btn-text { font-size: 10.5px; }

    /* ── Canvas ─────────────────────────────── */
    #canvas-wrap {
      position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
      overflow: hidden; cursor: grab;
    }
    #canvas-wrap.grabbing { cursor: grabbing; }
    #canvas { position: absolute; top: 0; left: 0; }

    /* ── Nodes ──────────────────────────────── */
    .node {
      position: absolute;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 9px 13px;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, opacity .3s;
      user-select: none;
      min-width: 145px;
      max-width: 200px;
    }
    .node:hover { border-color: var(--border-hover); }
    .node.dragging-node { z-index: 20; transition: none; cursor: grabbing; }
    .node.highlighted { z-index: 10; }
    .node.dimmed { opacity: 0.18; pointer-events: none; }
    .node.search-match { animation: pulse-border 1.5s ease infinite; }

    @keyframes pulse-border {
      0%,100% { box-shadow: none; }
      50% { box-shadow: 0 0 0 2px rgba(255,255,255,0.15); }
    }

    .node-header { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
    .node-icon { font-size: 15px; flex-shrink: 0; line-height: 1; }
    .node-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .node-badge {
      font-size: 9px; font-family: 'JetBrains Mono', monospace;
      padding: 1px 5px; border-radius: 4px; font-weight: 500;
      margin-left: auto; white-space: nowrap; flex-shrink: 0;
    }
    .node-sub {
      font-size: 10px; color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* layer colors */
    .node.client { border-color: rgba(56,189,248,0.22); }
    .node.client:hover, .node.client.highlighted { border-color: var(--c-client); box-shadow: var(--glow-client); }
    .node.client .node-name { color: var(--c-client); }
    .node.client .node-badge { background: rgba(56,189,248,0.12); color: var(--c-client); }

    .node.api { border-color: rgba(167,139,250,0.22); }
    .node.api:hover, .node.api.highlighted { border-color: var(--c-api); box-shadow: var(--glow-api); }
    .node.api .node-name { color: var(--c-api); }
    .node.api .node-badge { background: rgba(167,139,250,0.12); color: var(--c-api); }

    .node.service { border-color: rgba(52,211,153,0.22); }
    .node.service:hover, .node.service.highlighted { border-color: var(--c-service); box-shadow: var(--glow-service); }
    .node.service .node-name { color: var(--c-service); }
    .node.service .node-badge { background: rgba(52,211,153,0.12); color: var(--c-service); }

    .node.infra { border-color: rgba(245,158,11,0.22); }
    .node.infra:hover, .node.infra.highlighted { border-color: var(--c-infra); box-shadow: var(--glow-infra); }
    .node.infra .node-name { color: var(--c-infra); }
    .node.infra .node-badge { background: rgba(245,158,11,0.12); color: var(--c-infra); }

    .node.data { border-color: rgba(251,113,133,0.22); }
    .node.data:hover, .node.data.highlighted { border-color: var(--c-data); box-shadow: var(--glow-data); }
    .node.data .node-name { color: var(--c-data); }
    .node.data .node-badge { background: rgba(251,113,133,0.12); color: var(--c-data); }

    .node.external { border-color: rgba(148,163,184,0.18); }
    .node.external:hover, .node.external.highlighted { border-color: var(--c-external); box-shadow: var(--glow-external); }
    .node.external .node-name { color: var(--c-external); }
    .node.external .node-badge { background: rgba(148,163,184,0.1); color: var(--c-external); }

    /* ── SVG edges ──────────────────────────── */
    #svg-layer { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; }
    .edge { stroke-width: 1.4; fill: none; transition: opacity .25s; cursor: pointer; pointer-events: stroke; }
    .edge.dimmed { opacity: 0.05; }
    .edge.highlighted { stroke-width: 2.4; filter: drop-shadow(0 0 5px currentColor); }
    .edge:hover { stroke-width: 2.2; opacity: 0.9 !important; }

    /* ── Edge tooltip ──────────────────────── */
    #edge-tip {
      position: fixed; z-index: 200;
      background: var(--surface2); border: 1px solid var(--border-hover);
      border-radius: 6px; padding: 4px 10px;
      font-size: 10.5px; font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim); pointer-events: none;
      opacity: 0; transition: opacity .15s;
      white-space: nowrap;
    }
    #edge-tip.show { opacity: 1; }

    /* ── Info panel ─────────────────────────── */
    #info-panel {
      position: fixed; right: 0; top: 52px; bottom: 0;
      width: 290px; background: rgba(13,15,28,0.94);
      backdrop-filter: blur(22px);
      border-left: 1px solid var(--border);
      padding: 22px 18px;
      transform: translateX(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      z-index: 50; overflow-y: auto;
    }
    #info-panel.open { transform: translateX(0); }
    #panel-close {
      position: absolute; top: 14px; right: 14px;
      width: 26px; height: 26px; border-radius: 6px;
      border: 1px solid var(--border); background: none;
      color: var(--text-dim); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    #panel-close:hover { border-color: var(--border-hover); color: var(--text); }
    #panel-type { font-size: 9px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 5px; }
    #panel-name { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
    #panel-path {
      font-size: 10px; font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim); margin-bottom: 14px; word-break: break-all;
    }
    #panel-desc { font-size: 12px; color: var(--text-dim); line-height: 1.75; margin-bottom: 18px; }
    .panel-section-title {
      font-size: 9.5px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 8px; margin-top: 18px;
    }
    .conn-item {
      display: flex; align-items: center; gap: 7px; padding: 6px 9px;
      border-radius: 7px; margin-bottom: 3px;
      background: var(--surface); border: 1px solid var(--border);
      font-size: 11px; cursor: pointer; transition: border-color .2s;
    }
    .conn-item:hover { border-color: var(--border-hover); }
    .conn-arrow { font-size: 9px; color: var(--text-muted); flex-shrink: 0; }
    .conn-label { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; color: var(--text-dim); margin-left: auto; }
    #panel-tech { display: flex; flex-wrap: wrap; gap: 5px; }
    .tech-pill {
      font-size: 9.5px; padding: 2px 8px; border-radius: 20px;
      border: 1px solid var(--border); color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Minimap ────────────────────────────── */
    #minimap {
      position: fixed; bottom: 18px; left: 18px;
      width: 168px; height: 108px;
      background: rgba(13,15,28,0.92);
      border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
      backdrop-filter: blur(10px);
      cursor: crosshair;
    }
    #minimap canvas { width: 100%; height: 100%; }
    #minimap-vp {
      position: absolute; border: 1px solid rgba(56,189,248,0.55);
      background: rgba(56,189,248,0.06); pointer-events: none;
      border-radius: 3px;
    }

    /* ── Keyboard help modal ─────────────── */
    #kbd-modal {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(7,8,15,0.75); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    #kbd-modal.show { opacity: 1; pointer-events: auto; }
    .kbd-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px 32px; width: 420px;
      max-width: 95vw;
    }
    .kbd-box h2 { font-size: 15px; font-weight: 700; margin-bottom: 18px; }
    .kbd-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); align-items: center; }
    .kbd-row:last-child { border-bottom: none; }
    .kbd-desc { font-size: 12px; color: var(--text-dim); }
    .kbd-key {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      background: var(--surface2); border: 1px solid var(--border-hover);
      border-radius: 5px; padding: 2px 8px; color: var(--text);
    }
    #kbd-close-btn {
      margin-top: 18px; width: 100%; padding: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-dim); cursor: pointer; font-size: 12px;
      font-family: inherit; transition: all .2s;
    }
    #kbd-close-btn:hover { border-color: var(--border-hover); color: var(--text); }

    /* ── Toast ──────────────────────────────── */
    #toast {
      position: fixed; bottom: 22px; right: 22px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 9px; padding: 9px 14px;
      font-size: 11.5px; color: var(--text-dim);
      transform: translateY(60px); opacity: 0;
      transition: all .3s; pointer-events: none; z-index: 999;
    }
    #toast.show { transform: translateY(0); opacity: 1; }

    /* ── Grid background ─────────────────── */
    #canvas-wrap::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<!-- Header -->
<header id="header">
  <span class="logo">✉ nubmail</span>
  <div class="sep"></div>

  <div id="search-wrap">

    <button class="icon-btn" id="btn-zoom-in" title="Zoom in (+)">+</button>
    <button class="icon-btn" id="btn-zoom-out" title="Zoom out (-)">−</button>
    <button class="icon-btn" id="btn-export" title="Export PNG"><span>⬇</span><span class="btn-text">PNG</span></button>
    <button class="icon-btn" id="btn-help" title="Keyboard shortcuts (?)"><span>?</span></button>
  </div>
</header>

<!-- Canvas -->
<div id="canvas-wrap">
  <div id="canvas">
    <svg id="svg-layer"></svg>
  </div>
</div>

<!-- Info Panel -->
<aside id="info-panel">

  <div id="panel-path"></div>
  <div id="panel-desc"></div>

  </div>
  <div id="panel-conns-out-wrap">

    <div id="panel-conns-out"></div>
  </div>
  <div id="panel-tech-wrap">
    <div class="panel-section-title">Tech Stack</div>
    <div id="panel-tech"></div>
  </div>
</aside>

<!-- Minimap -->
<div id="minimap"><canvas id="mm-canvas"></canvas><div id="minimap-vp"></div></div>

<!-- Edge tooltip -->
<div id="edge-tip"></div>

<!-- Keyboard help -->
<div id="kbd-modal">
  <div class="kbd-box">
    <h2>⌨ Keyboard Shortcuts</h2>
    <div class="kbd-row"><span class="kbd-desc">Fit all nodes to screen</span><span class="kbd-key">F</span></div>

    <div class="kbd-row"><span class="kbd-desc">Deselect / close panel</span><span class="kbd-key">Esc</span></div>
    <div class="kbd-row"><span class="kbd-desc">Focus search</span><span class="kbd-key">/</span></div>
    <div class="kbd-row"><span class="kbd-desc">Show this panel</span><span class="kbd-key">?</span></div>
    <div class="kbd-row"><span class="kbd-desc">Pan canvas</span><span class="kbd-desc">Drag background</span></div>
    <div class="kbd-row"><span class="kbd-desc">Zoom canvas</span><span class="kbd-desc">Scroll / pinch</span></div>
    <div class="kbd-row"><span class="kbd-desc">Drag node</span><span class="kbd-desc">Drag node element</span></div>
    <button id="kbd-close-btn">Close</button>
  </div>
</div>

<div id="toast"></div>

    el.classList.add('dragging-node');
  });

  el.addEventListener('click', e => {
    if (Math.abs(e.clientX - (nodeDragOrigin?.x||0)) < 4 && Math.abs(e.clientY - (nodeDragOrigin?.y||0)) < 4) {
      selectNode(n.id);
    }
  });

  canvas.appendChild(el);
  nodeEls[n.id] = el;
  n._el = el;
});

// ── Create edges ──
const svgNS = 'http://www.w3.org/2000/svg';
const defs = document.createElementNS(svgNS, 'defs');
defs.innerHTML = Object.entries(LAYER_COLOR).map(([k,c]) => `
  <marker id="arr-${k}" markerWidth="8" markerHeight="8" refX="6.5" refY="3.5" orient="auto">
    <path d="M0,0 L0,7 L8,3.5 z" fill="${c}" opacity="0.75"/>
  </marker>
`).join('');
svg.appendChild(defs);

const edgeEls = EDGES.map((e, i) => {
  const fromNode = nodeMap[e.from], toNode = nodeMap[e.to];
  if (!fromNode || !toNode) return null;
  const layer = fromNode.layer;
  const line = document.createElementNS(svgNS, 'path');
  line.setAttribute('class', 'edge');
  line.setAttribute('stroke', LAYER_COLOR[layer]);
  line.setAttribute('opacity', '0.42');
  line.setAttribute('marker-end', `url(#arr-${layer})`);
  line.dataset.from = e.from;
  line.dataset.to   = e.to;
  line.dataset.label = e.label || '';
  line.style.pointerEvents = 'stroke';

  // Edge tooltip
  line.addEventListener('mousemove', ev => {
    edgeTip.textContent = e.label || `${e.from} → ${e.to}`;
    edgeTip.style.left = (ev.clientX + 14) + 'px';
    edgeTip.style.top  = (ev.clientY - 10) + 'px';
    edgeTip.classList.add('show');
  });
  line.addEventListener('mouseleave', () => edgeTip.classList.remove('show'));

  svg.appendChild(line);
  return { line, from: e.from, to: e.to, label: e.label, layer };
}).filter(Boolean);

function getNodeCenter(n) {
  const el = n._el;
  const w = el.offsetWidth || 155, h = el.offsetHeight || 65;
  return { x: n.x + w/2, y: n.y + h/2 };
}

function updateEdges() {
  edgeEls.forEach(({ line, from, to }) => {
    const fn = nodeMap[from], tn = nodeMap[to];
    if (!fn || !tn) return;
    const fc = getNodeCenter(fn), tc = getNodeCenter(tn);
    const dx = tc.x - fc.x, dy = tc.y - fc.y;
    // Offset parallel edges slightly
    const cx1 = fc.x + dx*0.45 - dy*0.05;
    const cy1 = fc.y + dy*0.45 + dx*0.05;
    const cx2 = tc.x - dx*0.45 - dy*0.05;
    const cy2 = tc.y - dy*0.45 + dx*0.05;
    line.setAttribute('d', `M${fc.x},${fc.y} C${cx1},${cy1} ${cx2},${cy2} ${tc.x},${tc.y}`);
  });
}

// ── Transform ──
function applyTransform() {
  canvas.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  canvas.style.transformOrigin = '0 0';
}

function fitAll() {
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  NODES.filter(n=>!hiddenLayers.has(n.layer)).forEach(n => {
    const w = (n._el?.offsetWidth||155), h = (n._el?.offsetHeight||65);
    minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x+w); maxY = Math.max(maxY, n.y+h);
  });
  const vw = canvasWrap.offsetWidth, vh = canvasWrap.offsetHeight;
  const pad = 70;
  scale = Math.min((vw-pad*2)/(maxX-minX), (vh-pad*2)/(maxY-minY), 1.4);
  tx = (vw - (maxX-minX)*scale)/2 - minX*scale;
  ty = (vh - (maxY-minY)*scale)/2 - minY*scale;
  applyTransform(); updateMinimap();
}

// ── Pan ──
canvasWrap.addEventListener('mousedown', e => {
  if (e.target.closest('.node')) return;
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  dragOrigin = { tx, ty };
  canvasWrap.classList.add('grabbing');
});

window.addEventListener('mousemove', e => {
  if (nodeDragging && nodeDragNode) {
    const dx = (e.clientX - nodeDragOrigin.x) / scale;
    const dy = (e.clientY - nodeDragOrigin.y) / scale;
    nodeDragNode.x = nodeDragOrigin.nx + dx;
    nodeDragNode.y = nodeDragOrigin.ny + dy;
    nodeDragEl.style.left = nodeDragNode.x + 'px';
    nodeDragEl.style.top  = nodeDragNode.y + 'px';
    updateEdges(); updateMinimap();
    return;
  }
  if (!dragging) return;
  tx = dragOrigin.tx + e.clientX - dragStart.x;
  ty = dragOrigin.ty + e.clientY - dragStart.y;
  applyTransform(); updateMinimap();
});

window.addEventListener('mouseup', () => {
  dragging = false;
  canvasWrap.classList.remove('grabbing');
  if (nodeDragging && nodeDragEl) {
    nodeDragEl.classList.remove('dragging-node');
    nodeDragging = false; nodeDragEl = null; nodeDragNode = null;
  }
});

// ── Zoom ──
canvasWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvasWrap.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.1 : 0.91;
  const ns = Math.min(Math.max(scale * factor, 0.15), 2.8);
  tx = mx - (mx - tx) * (ns/scale);
  ty = my - (my - ty) * (ns/scale);
  scale = ns;
  applyTransform(); updateMinimap();
}, { passive: false });

document.getElementById('btn-zoom-in').onclick  = () => zoom(1.18);
document.getElementById('btn-zoom-out').onclick = () => zoom(0.85);
document.getElementById('btn-fit').onclick      = fitAll;

function zoom(f) {
  const cx = canvasWrap.offsetWidth/2, cy = canvasWrap.offsetHeight/2;
  const ns = Math.min(Math.max(scale*f, 0.15), 2.8);
  tx = cx - (cx-tx)*(ns/scale); ty = cy - (cy-ty)*(ns/scale);
  scale = ns; applyTransform(); updateMinimap();
}

// ── Select ──
function selectNode(id) {
  selectedId = id;
  const node = nodeMap[id];
  const col = LAYER_COLOR[node.layer];

  NODES.forEach(n => {
    n._el.classList.remove('highlighted','dimmed');
    const connected = edgesFrom[id].some(e=>e.to===n.id) || edgesTo[id].some(e=>e.from===n.id) || n.id===id;
    n._el.classList.add(connected ? 'highlighted' : 'dimmed');
  });

  edgeEls.forEach(({ line, from, to }) => {
    const connected = from===id || to===id;
    line.classList.toggle('dimmed', !connected);
    line.classList.toggle('highlighted', connected);
    line.setAttribute('opacity', connected ? '0.9' : '0.05');
  });

  document.getElementById('panel-type').textContent  = node.layer.toUpperCase();
  document.getElementById('panel-type').style.color  = col;
  document.getElementById('panel-name').textContent  = `${node.icon} ${node.name}`;
  document.getElementById('panel-name').style.color  = col;
  document.getElementById('panel-path').textContent  = node.path;
  document.getElementById('panel-desc').textContent  = node.desc;

  const inEl = document.getElementById('panel-conns-in');
  inEl.innerHTML = '';
  edgesTo[id].forEach(e => {
    const fn = nodeMap[e.from];
    const d = document.createElement('div');
    d.className = 'conn-item';
    d.innerHTML = `<span style="color:${LAYER_COLOR[fn.layer]}">${fn.icon} ${fn.name}</span><span class="conn-arrow">→ here</span><span class="conn-label">${e.label||''}</span>`;
    d.onclick = () => selectNode(fn.id);
    inEl.appendChild(d);
  });
  if (!edgesTo[id].length) inEl.innerHTML = '<div style="font-size:11px;color:#374151">None</div>';

  const outEl = document.getElementById('panel-conns-out');
  outEl.innerHTML = '';
  edgesFrom[id].forEach(e => {
    const tn = nodeMap[e.to];
    const d = document.createElement('div');
    d.className = 'conn-item';
    d.innerHTML = `<span class="conn-arrow">→</span><span style="color:${LAYER_COLOR[tn.layer]}">${tn.icon} ${tn.name}</span><span class="conn-label">${e.label||''}</span>`;
    d.onclick = () => selectNode(tn.id);
    outEl.appendChild(d);
  });
  if (!edgesFrom[id].length) outEl.innerHTML = '<div style="font-size:11px;color:#374151">None</div>';

  const techEl = document.getElementById('panel-tech');
  techEl.innerHTML = (node.tech||[]).map(t=>`<span class="tech-pill">${t}</span>`).join('');

  infoPanel.classList.add('open');
}

function clearSelection() {
  selectedId = null;
  NODES.forEach(n => n._el.classList.remove('highlighted','dimmed'));
  edgeEls.forEach(({line}) => {
    line.classList.remove('dimmed','highlighted');
    line.setAttribute('opacity','0.42');
  });
  infoPanel.classList.remove('open');
}

document.getElementById('panel-close').onclick = clearSelection;
canvasWrap.addEventListener('click', e => {
  if (!e.target.closest('.node') && !e.target.closest('#info-panel')) clearSelection();
});

// ── Legend filter ──
document.querySelectorAll('.leg-item').forEach(el => {
  el.addEventListener('click', () => {
    const layer = el.dataset.layer;
    hiddenLayers.has(layer) ? hiddenLayers.delete(layer) : hiddenLayers.add(layer);
    el.classList.toggle('active', !hiddenLayers.has(layer));
    applyLayerFilter();
  });
});

function applyLayerFilter() {
  NODES.forEach(n => { n._el.style.display = hiddenLayers.has(n.layer) ? 'none' : ''; });
  edgeEls.forEach(({line, from, to}) => {
    const fh = hiddenLayers.has(nodeMap[from]?.layer);
    const th = hiddenLayers.has(nodeMap[to]?.layer);
    line.style.display = (fh||th) ? 'none' : '';
  });
  updateMinimap();
}

// ── Search ──
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  if (!searchQuery) {
    NODES.forEach(n => { n._el.classList.remove('highlighted','dimmed','search-match'); });
    edgeEls.forEach(({line}) => { line.classList.remove('dimmed'); line.setAttribute('opacity','0.42'); });
    return;
  }
  NODES.forEach(n => {
    const match = n.name.toLowerCase().includes(searchQuery) ||
                  n.path.toLowerCase().includes(searchQuery) ||
                  n.badge.toLowerCase().includes(searchQuery) ||
                  n.desc.toLowerCase().includes(searchQuery) ||
                  (n.tech||[]).some(t=>t.toLowerCase().includes(searchQuery));
    n._el.classList.toggle('highlighted', match);
    n._el.classList.toggle('search-match', match);
    n._el.classList.toggle('dimmed', !match);
  });
  edgeEls.forEach(({line}) => { line.classList.add('dimmed'); line.setAttribute('opacity','0.05'); });
});

// ── Export PNG ──
document.getElementById('btn-export').addEventListener('click', () => {
  const w = canvasWrap.offsetWidth, h = canvasWrap.offsetHeight;
  const exportCanvas = document.createElement('canvas');
  exportCanvas.width = w * window.devicePixelRatio;
  exportCanvas.height = h * window.devicePixelRatio;
  const ctx = exportCanvas.getContext('2d');
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  ctx.fillStyle = '#07080f';
  ctx.fillRect(0,0,w,h);
  ctx.fillStyle = '#6b7280';
  ctx.font = '14px Inter, sans-serif';
  ctx.fillText('nubmail · Architecture Graph', 20, 30);
  ctx.fillText(`${NODES.length} nodes · ${EDGES.length} edges`, 20, 50);

  const a = document.createElement('a');
  a.download = 'nubmail-architecture.png';
  a.href = exportCanvas.toDataURL('image/png');
  a.click();
  showToast('📸 PNG exported!');
});

// ── Minimap ──
const mmCanvas = document.getElementById('mm-canvas');
const mmCtx    = mmCanvas.getContext('2d');
const mmVp     = document.getElementById('minimap-vp');
mmCanvas.width = 336; mmCanvas.height = 216;

function updateMinimap() {
  mmCtx.clearRect(0,0,336,216);
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  NODES.filter(n=>!hiddenLayers.has(n.layer)).forEach(n => {
    minX=Math.min(minX,n.x); minY=Math.min(minY,n.y);
    maxX=Math.max(maxX,n.x+160); maxY=Math.max(maxY,n.y+80);
  });
  const mmScale = Math.min(326/(maxX-minX), 206/(maxY-minY));

  // Draw edges
  mmCtx.lineWidth = 0.5;
  edgeEls.forEach(({from,to,layer}) => {
    if (hiddenLayers.has(nodeMap[from]?.layer)||hiddenLayers.has(nodeMap[to]?.layer)) return;
    const fn = nodeMap[from], tn = nodeMap[to];
    const fc = getNodeCenter(fn), tc = getNodeCenter(tn);
    mmCtx.strokeStyle = LAYER_COLOR[layer]+'40';
    mmCtx.beginPath();
    mmCtx.moveTo((fc.x-minX)*mmScale+5, (fc.y-minY)*mmScale+5);
    mmCtx.lineTo((tc.x-minX)*mmScale+5, (tc.y-minY)*mmScale+5);
    mmCtx.stroke();
  });

  // Draw nodes
  NODES.forEach(n => {
    if (hiddenLayers.has(n.layer)) return;
    const x = (n.x-minX)*mmScale+5, y = (n.y-minY)*mmScale+5;
    mmCtx.fillStyle = LAYER_COLOR[n.layer]+(n.id===selectedId?'cc':'55');
    mmCtx.beginPath();
    if (mmCtx.roundRect) mmCtx.roundRect(x, y, 20, 11, 2);
    else mmCtx.rect(x, y, 20, 11);
    mmCtx.fill();
  });

  // Viewport indicator
  const vpW = canvasWrap.offsetWidth, vpH = canvasWrap.offsetHeight;
  const vx = (-tx/scale - minX)*mmScale+5;
  const vy = (-ty/scale - minY)*mmScale+5;
  const vw2 = (vpW/scale)*mmScale;
  const vh2 = (vpH/scale)*mmScale;
  mmVp.style.left   = (vx/336*168)+'px';
  mmVp.style.top    = (vy/216*108)+'px';
  mmVp.style.width  = (vw2/336*168)+'px';
  mmVp.style.height = (vh2/216*108)+'px';
}

// Minimap click to navigate
document.getElementById('minimap').addEventListener('click', e => {
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  NODES.forEach(n => { minX=Math.min(minX,n.x); minY=Math.min(minY,n.y); maxX=Math.max(maxX,n.x+160); maxY=Math.max(maxY,n.y+80); });
  const mmScale = Math.min(326/(maxX-minX), 206/(maxY-minY));
  const rect = document.getElementById('minimap').getBoundingClientRect();
  const px = (e.clientX - rect.left) / 168 * 336;
  const py = (e.clientY - rect.top)  / 108 * 216;
  const worldX = (px-5)/mmScale + minX;
  const worldY = (py-5)/mmScale + minY;
  tx = canvasWrap.offsetWidth/2  - worldX*scale;
  ty = canvasWrap.offsetHeight/2 - worldY*scale;
  applyTransform(); updateMinimap();
});

// ── Keyboard help ──
const kbdModal = document.getElementById('kbd-modal');
document.getElementById('btn-help').onclick = () => kbdModal.classList.add('show');
document.getElementById('kbd-close-btn').onclick = () => kbdModal.classList.remove('show');
kbdModal.addEventListener('click', e => { if (e.target===kbdModal) kbdModal.classList.remove('show'); });

// ── Toast ──
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ── Keyboard shortcuts ──
window.addEventListener('keydown', e => {
  if (document.activeElement === document.getElementById('search')) return;
  if (e.key==='Escape') { clearSelection(); kbdModal.classList.remove('show'); }
  if (e.key==='f'||e.key==='F') fitAll();
  if (e.key==='+'||e.key==='=') zoom(1.18);
  if (e.key==='-') zoom(0.85);
  if (e.key==='/') { e.preventDefault(); document.getElementById('search').focus(); }
  if (e.key==='?') kbdModal.classList.toggle('show');
});

// ── Init ──
setTimeout(() => {
  updateEdges();
  fitAll();
  updateMinimap();

  // Staggered entrance animation
  NODES.forEach((n, i) => {
    n._el.style.opacity = '0';
    n._el.style.transform = 'translateY(10px) scale(0.96)';
    n._el.style.transition = `opacity .45s ease ${i*8}ms, transform .45s ease ${i*8}ms`;
    setTimeout(() => {
      n._el.style.opacity = '';
      n._el.style.transform = '';
    }, 80 + i * 8);
  });
}, 60);
</script>
</body>
